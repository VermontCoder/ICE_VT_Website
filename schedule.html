<!DOCTYPE html>
<html lang="en">
<head>

    <title>ICE Tours VT - Schedule</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="main-content">
        <h1>Tour Schedule</h1>

        <div class="subtitle-text">

                Tour dates will be announced soon.

        <table class="schedule-table">

                <tr>
                    <th>Date</th>

            </thead>
            <tbody>
                <tr>
                    <td>TBD</td>
                    <td>TBD</td>
                    <td>TBD</td>
                </tr>
            </tbody>
        </table>

        <img src="img/marginalia/fierce_bus.png" alt="Fierce Bus" class="marginalia-inline">
    </div>

    <div id="footer-placeholder"></div>
    <script src="includes.js"></script>

</html>
